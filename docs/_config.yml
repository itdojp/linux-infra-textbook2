title: "実践 Linux インフラエンジニア入門"
description: "コンテナ・クラウド時代に必要な Linux インフラエンジニアの基礎技術を実践的に学べる技術書"
author: "ITDO Inc.（株式会社アイティードゥ）"
lang: "ja"
url: "https://itdojp.github.io"
baseurl: "/linux-infra-textbook2"
repository: "itdojp/linux-infra-textbook2"
repository_branch: "main"
repository_docs_path: "docs"
version: "1.0.1"

# Jekyll設定
markdown: kramdown
highlighter: rouge
permalink: pretty

# プラグイン
plugins:
  - jekyll-feed
  - jekyll-sitemap 
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-optional-front-matter

# デフォルト設定
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "book"

# 日本語対応
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    line_numbers: false

# GitHub Pages設定
github:
  is_project_page: true

exclude:
  - node_modules/
  - scripts/
  - templates/
  - src/
  - package*.json
  - README.md
  - "*.tmp"
  - Gemfile*
